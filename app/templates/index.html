<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        form {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 70%;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 14px;
            font-size: 16px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .empty {
            text-align: center;
            color: #777;
        }

        .delete-form {
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>Task Manager</h1>

    <form action="{{ url_for('add_task') }}" method="POST">
        <input type="text" name="title" placeholder="Wpisz nowe zadanie..." required>
        <button type="submit">Dodaj</button>
    </form>

    {% if tasks %}
        <ul>
            {% for task in tasks %}
                <li>
                    <span>{{ task.title }}</span>
                    <form class="delete-form" action="{{ url_for('delete_task', task_id=task.id) }}" method="POST">
                        <button type="submit">Usuń</button>
                    </form>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="empty">Brak zadań. Dodaj pierwsze zadanie.</p>
    {% endif %}
</body>
</html>
